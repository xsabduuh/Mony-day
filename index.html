<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>خزنة | تتبع الأهداف المالية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== CONFETTI CANVAS ===== -->

<canvas id="confetti-canvas"></canvas>

  <!-- ===== BACKGROUND GRID ===== -->

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- ===== HEADER ===== -->

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">خزنة</span>
        <span class="logo-sub">الأهداف المالية</span>
      </div>
      <div class="header-stats">
        <div class="stat-chip">
          <span class="stat-label">إجمالي المدخرات</span>
          <span class="stat-value" id="total-saved">0 MAD</span>
        </div>
        <div class="stat-chip accent">
          <span class="stat-label">الأهداف النشطة</span>
          <span class="stat-value" id="total-goals">0</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->

  <main class="main-content">

```
<!-- ADD GOAL BUTTON -->
<div class="add-goal-bar">
  <button class="btn-add-goal" id="btn-open-modal" aria-label="إضافة هدف جديد">
    <span class="btn-icon">＋</span>
    <span>هدف جديد</span>
  </button>
  <p class="empty-hint" id="empty-hint">لا توجد أهداف بعد — أضف هدفك الأول الآن ✦</p>
</div>

<!-- GOALS GRID -->
<div class="goals-grid" id="goals-grid"></div>
```

  </main>

  <!-- ===== MODAL: ADD / EDIT GOAL ===== -->

  <div class="modal-overlay" id="goal-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <button class="modal-close" id="modal-close" aria-label="إغلاق">✕</button>
      <h2 class="modal-title" id="modal-title">إضافة هدف جديد</h2>

```
  <div class="form-group">
    <label for="goal-name">اسم الهدف</label>
    <input type="text" id="goal-name" placeholder="مثال: سيارة أحلامي" maxlength="40" autocomplete="off" />
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="goal-target">المبلغ المستهدف (MAD)</label>
      <input type="number" id="goal-target" placeholder="50000" min="1" />
    </div>
    <div class="form-group">
      <label for="goal-saved">المدخر حالياً (MAD)</label>
      <input type="number" id="goal-saved" placeholder="0" min="0" />
    </div>
  </div>

  <div class="form-group">
    <label>اختر أيقونة</label>
    <div class="icon-picker" id="icon-picker"></div>
  </div>

  <div class="form-group">
    <label>اختر لون الهدف</label>
    <div class="color-picker" id="color-picker"></div>
  </div>

  <div class="modal-actions">
    <button class="btn-cancel" id="btn-cancel">إلغاء</button>
    <button class="btn-save" id="btn-save">حفظ الهدف</button>
  </div>
</div>
```

  </div>

  <!-- ===== MODAL: ADD AMOUNT ===== -->

  <div class="modal-overlay" id="amount-modal" role="dialog" aria-modal="true">
    <div class="modal-card small">
      <button class="modal-close" id="amount-modal-close" aria-label="إغلاق">✕</button>
      <h2 class="modal-title">إضافة مبلغ</h2>
      <p class="modal-sub" id="amount-modal-goal-name">—</p>

```
  <div class="form-group">
    <label for="add-amount-input">المبلغ (MAD)</label>
    <input type="number" id="add-amount-input" placeholder="500" min="1" autocomplete="off" />
  </div>

  <div class="modal-actions">
    <button class="btn-cancel" id="amount-btn-cancel">إلغاء</button>
    <button class="btn-save" id="amount-btn-save">إضافة</button>
  </div>
</div>
```

  </div>

  <!-- ===== MODAL: HISTORY ===== -->

  <div class="modal-overlay" id="history-modal" role="dialog" aria-modal="true">
    <div class="modal-card medium">
      <button class="modal-close" id="history-modal-close" aria-label="إغلاق">✕</button>
      <h2 class="modal-title">سجل المدخرات</h2>
      <p class="modal-sub" id="history-modal-goal-name">—</p>
      <div class="history-list" id="history-list"></div>
    </div>
  </div>

  <!-- ===== GOAL CARD TEMPLATE ===== -->

  <template id="goal-card-template">
    <article class="goal-card" data-id="">
      <div class="card-header">
        <div class="card-icon-wrap">
          <span class="card-icon"></span>
        </div>
        <div class="card-title-group">
          <h3 class="card-title"></h3>
          <span class="card-status"></span>
        </div>
        <div class="card-menu">
          <button class="btn-menu" aria-label="خيارات">⋯</button>
          <div class="dropdown-menu">
            <button class="drop-item btn-edit">✎ تعديل</button>
            <button class="drop-item btn-history">⌚ السجل</button>
            <button class="drop-item btn-delete danger">✕ حذف</button>
          </div>
        </div>
      </div>

```
  <div class="card-donut-wrap">
    <svg class="donut-chart" viewBox="0 0 120 120">
      <circle class="donut-bg" cx="60" cy="60" r="46" />
      <circle class="donut-fill" cx="60" cy="60" r="46" />
    </svg>
    <div class="donut-center">
      <span class="donut-percent"></span>
      <span class="donut-label">مكتمل</span>
    </div>
  </div>

  <div class="card-amounts">
    <div class="amount-item">
      <span class="amount-label">المُدخَّر</span>
      <span class="amount-value saved-val"></span>
    </div>
    <div class="amount-divider"></div>
    <div class="amount-item">
      <span class="amount-label">المستهدف</span>
      <span class="amount-value target-val"></span>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-track">
      <div class="progress-bar-fill"></div>
    </div>
  </div>

  <div class="card-footer">
    <span class="remaining-label"></span>
    <button class="btn-add-amount">＋ إضافة مبلغ</button>
  </div>
</article>
```

  </template>

  <script src="app.js"></script>

</body>
</html>
