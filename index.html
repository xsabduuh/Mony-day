<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تطبيق احترافي لتتبع الأهداف المالية">
    <title>💰 تتبع الأهداف المالية</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="animated-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- الحاوية الرئيسية -->
    <div class="container">
        
        <!-- رأس الصفحة -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-piggy-bank"></i>
                <h1>تتبع الأهداف المالية</h1>
            </div>
            <p class="subtitle">حقق أحلامك المالية خطوة بخطوة</p>
            
            <!-- ملخص إجمالي -->
            <div class="summary-cards">
                <div class="summary-card total-goals">
                    <i class="fas fa-bullseye"></i>
                    <div class="summary-info">
                        <span class="summary-value" id="totalGoals">0</span>
                        <span class="summary-label">الأهداف</span>
                    </div>
                </div>
                <div class="summary-card total-saved">
                    <i class="fas fa-wallet"></i>
                    <div class="summary-info">
                        <span class="summary-value" id="totalSaved">0</span>
                        <span class="summary-label">المدخرات</span>
                    </div>
                </div>
                <div class="summary-card total-target">
                    <i class="fas fa-flag-checkered"></i>
                    <div class="summary-info">
                        <span class="summary-value" id="totalTarget">0</span>
                        <span class="summary-label">المستهدف</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- زر إضافة هدف جديد -->
        <button class="btn-add-goal" id="btnAddGoal">
            <i class="fas fa-plus"></i>
            <span>إضافة هدف مالي جديد</span>
        </button>

        <!-- شبكة الأهداف -->
        <div class="goals-grid" id="goalsGrid">
            <!-- سيتم إضافة الأهداف هنا ديناميكياً -->
        </div>

        <!-- رسالة عند عدم وجود أهداف -->
        <div class="empty-state" id="emptyState">
            <div class="empty-illustration">
                <i class="fas fa-rocket"></i>
            </div>
            <h2>ابدأ رحلتك المالية</h2>
            <p>لم تقم بإضافة أي أهداف بعد. اضغط على الزر أعلاه لإضافة هدفك الأول!</p>
        </div>
    </div>

    <!-- نموذج إضافة/تعديل هدف -->
    <div class="modal" id="goalModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">إضافة هدف جديد</h2>
                <button class="btn-close" id="btnCloseModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <form class="modal-form" id="goalForm">
                <input type="hidden" id="goalId">
                
                <div class="form-group">
                    <label for="goalName">
                        <i class="fas fa-tag"></i>
                        اسم الهدف
                    </label>
                    <input type="text" id="goalName" placeholder="مثال: شراء سيارة" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="targetAmount">
                            <i class="fas fa-bullseye"></i>
                            المبلغ المستهدف
                        </label>
                        <input type="number" id="targetAmount" placeholder="10000" min="1" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="currentAmount">
                            <i class="fas fa-coins"></i>
                            المبلغ المدخر حالياً
                        </label>
                        <input type="number" id="currentAmount" placeholder="0" min="0" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-palette"></i>
                        اختر لون الهدف
                    </label>
                    <div class="color-picker" id="colorPicker">
                        <button type="button" class="color-option" data-color="#6366f1" style="--color: #6366f1;"></button>
                        <button type="button" class="color-option" data-color="#8b5cf6" style="--color: #8b5cf6;"></button>
                        <button type="button" class="color-option" data-color="#ec4899" style="--color: #ec4899;"></button>
                        <button type="button" class="color-option" data-color="#f43f5e" style="--color: #f43f5e;"></button>
                        <button type="button" class="color-option" data-color="#f97316" style="--color: #f97316;"></button>
                        <button type="button" class="color-option" data-color="#eab308" style="--color: #eab308;"></button>
                        <button type="button" class="color-option" data-color="#22c55e" style="--color: #22c55e;"></button>
                        <button type="button" class="color-option" data-color="#14b8a6" style="--color: #14b8a6;"></button>
                        <button type="button" class="color-option" data-color="#06b6d4" style="--color: #06b6d4;"></button>
                        <button type="button" class="color-option" data-color="#3b82f6" style="--color: #3b82f6;"></button>
                    </div>
                    <input type="hidden" id="selectedColor" value="#6366f1">
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-icons"></i>
                        اختر أيقونة الهدف
                    </label>
                    <div class="icon-picker" id="iconPicker">
                        <button type="button" class="icon-option active" data-icon="fa-car">
                            <i class="fas fa-car"></i>
                        </button>
                        <button type="button" class="icon-option" data-icon="fa-home">
                            <i class="fas fa-home"></i>
                        </button>
                        <button type="button" class="icon-option" data-icon="fa-plane">
                            <i class="fas fa-plane"></i>
                        </button>
                        <button type="button" class="icon-option" data-icon="fa-graduation-cap">
                            <i class="fas fa-graduation-cap"></i>
                        </button>
                        <button type="button" class="icon-option" data-icon="fa-heart">
                            <i class="fas fa-heart"></i>
                        </button>
                        <button type="button" class="icon-option" data-icon="fa-briefcase">
                            <i class="fas fa-briefcase"></i>
                        </button>
                        <button type="button" class="icon-option" data-icon="fa-laptop">
                            <i class="fas fa-laptop"></i>
                        </button>
                        <button type="button" class="icon-option" data-icon="fa-mobile-alt">
                            <i class="fas fa-mobile-alt"></i>
                        </button>
                        <button type="button" class="icon-option" data-icon="fa-shopping-bag">
                            <i class="fas fa-shopping-bag"></i>
                        </button>
                        <button type="button" class="icon-option" data-icon="fa-gift">
                            <i class="fas fa-gift"></i>
                        </button>
                        <button type="button" class="icon-option" data-icon="fa-coins">
                            <i class="fas fa-coins"></i>
                        </button>
                        <button type="button" class="icon-option" data-icon="fa-piggy-bank">
                            <i class="fas fa-piggy-bank"></i>
                        </button>
                    </div>
                    <input type="hidden" id="selectedIcon" value="fa-car">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="btnCancel">إلغاء</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i>
                        حفظ الهدف
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- نموذج إضافة مبلغ -->
    <div class="modal" id="addAmountModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>إضافة مبلغ للهدف</h2>
                <button class="btn-close" id="btnCloseAddAmount">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <form class="modal-form" id="addAmountForm">
                <input type="hidden" id="addAmountGoalId">
                
                <div class="form-group">
                    <label for="amountToAdd">
                        <i class="fas fa-plus-circle"></i>
                        المبلغ المراد إضافته
                    </label>
                    <input type="number" id="amountToAdd" placeholder="أدخل المبلغ" min="1" required>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="btnCancelAddAmount">إلغاء</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-plus"></i>
                        إضافة
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- نموذج سجل التبرعات -->
    <div class="modal" id="historyModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="historyTitle">سجل المدخرات</h2>
                <button class="btn-close" id="btnCloseHistory">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="history-content" id="historyContent">
                <!-- سيتم إضافة السجل هنا ديناميكياً -->
            </div>
        </div>
    </div>

    <!-- نافذة تأكيد الحذف -->
    <div class="modal" id="deleteModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>تأكيد الحذف</h2>
                <button class="btn-close" id="btnCloseDelete">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="delete-confirmation">
                <i class="fas fa-exclamation-triangle"></i>
                <p>هل أنت متأكد من حذف هذا الهدف؟</p>
                <p class="delete-warning">لا يمكن التراجع عن هذا الإجراء.</p>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-secondary" id="btnCancelDelete">إلغاء</button>
                <button type="button" class="btn-danger" id="btnConfirmDelete">
                    <i class="fas fa-trash"></i>
                    حذف
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- JavaScript -->
    <script src="js/app.js"></script>
</body>
</html>
