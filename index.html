<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="description" content="تطبيق احترافي لتتبع الأهداف المالية">
    <title>💰 تتبع الأهداف المالية</title>
    
    <!-- منع نسخ النص -->
    <style>
        * {
            user-select: none !important;
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* السماح بالكتابة داخل الحقول فقط */
        input, textarea {
            user-select: auto !important;
            -webkit-user-select: auto !important;
            -moz-user-select: auto !important;
            -ms-user-select: auto !important;
        }
        
        /* منع تكبير الشاشة عند التركيز على الحقول */
        input:focus, textarea:focus, select:focus, button:focus {
            font-size: 16px !important;
        }
    </style>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Tajawal',sans-serif;background:#0f0f1a;color:#fff;padding:1rem}
        .container{max-width:1200px;margin:0 auto}
        .header{text-align:center;margin-bottom:2rem}
        .logo{display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:0.5rem}
        .logo i{font-size:2.5rem;color:#6366f1}
        .logo h1{font-size:1.8rem;background:linear-gradient(135deg,#fff,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .subtitle{color:rgba(255,255,255,0.7);margin-bottom:1.5rem}
        .summary-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
        .summary-card{background:rgba(255,255,255,0.05);border-radius:16px;padding:1rem;text-align:center}
        .summary-card i{font-size:1.5rem;margin-bottom:0.5rem}
        .summary-value{font-size:1.5rem;font-weight:bold;display:block}
        .summary-label{font-size:0.8rem;color:rgba(255,255,255,0.6)}
        .btn-add-goal{width:100%;padding:1rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:50px;color:#fff;font-size:1.1rem;font-weight:bold;margin-bottom:2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.5rem}
        .goals-grid{display:grid;grid-template-columns:1fr;gap:1.5rem}
        .goal-card{background:rgba(255,255,255,0.05);border-radius:20px;padding:1.5rem}
        .goal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
        .goal-info{display:flex;align-items:center;gap:0.75rem}
        .goal-icon{width:50px;height:50px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
        .goal-title-section h3{font-size:1.1rem}
        .goal-status{font-size:0.75rem;color:rgba(255,255,255,0.5)}
        .goal-status.completed{color:#22c55e}
        .goal-actions{display:flex;gap:0.5rem}
        .btn-icon{background:rgba(255,255,255,0.1);border:none;border-radius:8px;width:35px;height:35px;color:#fff;cursor:pointer}
        .chart-container{position:relative;width:150px;height:150px;margin:0 auto 1rem}
        .chart-percentage{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
        .chart-percentage .percentage{font-size:1.8rem;font-weight:bold}
        .goal-amounts{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
        .amount-box{background:rgba(0,0,0,0.3);border-radius:12px;padding:0.75rem;text-align:center}
        .amount-value{font-size:1.2rem;font-weight:bold}
        .progress-bar-container{height:10px;background:rgba(0,0,0,0.3);border-radius:50px;overflow:hidden;margin-bottom:1rem}
        .progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);width:0%;transition:width 0.5s}
        .goal-buttons{display:flex;gap:0.5rem;flex-wrap:wrap}
        .btn-add-money{flex:1;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:10px;padding:0.7rem;color:#fff;cursor:pointer}
        .btn-quick-add{background:rgba(255,255,255,0.1);border:none;border-radius:10px;padding:0.7rem 1rem;color:#fff;cursor:pointer}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;visibility:hidden;transition:all 0.3s}
        .modal.active{opacity:1;visibility:visible}
        .modal-content{background:#1a1a2e;border-radius:20px;width:90%;max-width:500px;padding:1.5rem}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
        .btn-close{background:rgba(255,255,255,0.1);border:none;border-radius:8px;width:35px;height:35px;color:#fff;cursor:pointer}
        .form-group{margin-bottom:1rem}
        .form-group label{display:block;margin-bottom:0.5rem;color:rgba(255,255,255,0.7)}
        .form-group input{width:100%;padding:0.8rem;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:16px}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        .color-picker{display:flex;flex-wrap:wrap;gap:0.5rem}
        .color-option{width:40px;height:40px;border-radius:50%;border:2px solid transparent;cursor:pointer}
        .color-option.active{border-color:#fff}
        .icon-picker{display:grid;grid-template-columns:repeat(6,1fr);gap:0.5rem}
        .icon-option{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:0.5rem;cursor:pointer;text-align:center}
        .icon-option.active{background:#6366f1}
        .form-actions{display:flex;gap:1rem;margin-top:1.5rem}
        .btn-primary{flex:1;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:10px;padding:0.8rem;color:#fff;cursor:pointer}
        .btn-secondary{flex:1;background:rgba(255,255,255,0.1);border:none;border-radius:10px;padding:0.8rem;color:#fff;cursor:pointer}
        .empty-state{text-align:center;padding:3rem;display:none}
        .empty-state.active{display:block}
        .toast-container{position:fixed;top:1rem;left:1rem;z-index:2000}
        .toast{background:#1a1a2e;border-radius:10px;padding:0.8rem 1.2rem;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.5rem}
        .toast.success{border-right:3px solid #22c55e}
        @media(max-width:768px){.summary-cards{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}
        
        /* منع تحديد النص في التطبيق بالكامل */
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        /* السماح بالكتابة فقط في الحقول */
        input, textarea {
            -webkit-user-select: text !important;
            user-select: text !important;
        }
        
        /* منع التكبير التلقائي عند التركيز على الحقول */
        input, textarea, select {
            font-size: 16px !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-piggy-bank"></i>
                <h1>تتبع الأهداف المالية</h1>
            </div>
            <p class="subtitle">حقق أحلامك المالية خطوة بخطوة</p>
            <div class="summary-cards">
                <div class="summary-card"><i class="fas fa-bullseye"></i><span class="summary-value" id="totalGoals">0</span><span class="summary-label">الأهداف</span></div>
                <div class="summary-card"><i class="fas fa-wallet"></i><span class="summary-value" id="totalSaved">0</span><span class="summary-label">المدخرات</span></div>
                <div class="summary-card"><i class="fas fa-flag-checkered"></i><span class="summary-value" id="totalTarget">0</span><span class="summary-label">المستهدف</span></div>
            </div>
        </header>
        <button class="btn-add-goal" id="btnAddGoal"><i class="fas fa-plus"></i> إضافة هدف مالي جديد</button>
        <div class="goals-grid" id="goalsGrid"></div>
        <div class="empty-state" id="emptyState"><i class="fas fa-rocket" style="font-size:3rem;margin-bottom:1rem"></i><h2>ابدأ رحلتك المالية</h2><p>اضغط على الزر أعلاه لإضافة هدفك الأول</p></div>
    </div>

    <div class="modal" id="goalModal">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modalTitle">إضافة هدف جديد</h2><button class="btn-close" id="btnCloseModal"><i class="fas fa-times"></i></button></div>
            <form id="goalForm">
                <input type="hidden" id="goalId">
                <div class="form-group"><label>اسم الهدف</label><input type="text" id="goalName" placeholder="مثال: شراء سيارة" required></div>
                <div class="form-row">
                    <div class="form-group"><label>المبلغ المستهدف</label><input type="number" id="targetAmount" placeholder="10000" required></div>
                    <div class="form-group"><label>المبلغ المدخر</label><input type="number" id="currentAmount" placeholder="0" required></div>
                </div>
                <div class="form-group"><label>اختر لون الهدف</label><div class="color-picker" id="colorPicker">
                    <button type="button" class="color-option" data-color="#6366f1" style="background:#6366f1"></button>
                    <button type="button" class="color-option" data-color="#8b5cf6" style="background:#8b5cf6"></button>
                    <button type="button" class="color-option" data-color="#ec4899" style="background:#ec4899"></button>
                    <button type="button" class="color-option" data-color="#22c55e" style="background:#22c55e"></button>
                    <button type="button" class="color-option" data-color="#f97316" style="background:#f97316"></button>
                </div><input type="hidden" id="selectedColor" value="#6366f1"></div>
                <div class="form-group"><label>اختر أيقونة</label><div class="icon-picker" id="iconPicker">
                    <button type="button" class="icon-option" data-icon="fa-car"><i class="fas fa-car"></i></button>
                    <button type="button" class="icon-option" data-icon="fa-home"><i class="fas fa-home"></i></button>
                    <button type="button" class="icon-option" data-icon="fa-plane"><i class="fas fa-plane"></i></button>
                    <button type="button" class="icon-option" data-icon="fa-heart"><i class="fas fa-heart"></i></button>
                    <button type="button" class="icon-option" data-icon="fa-coins"><i class="fas fa-coins"></i></button>
                    <button type="button" class="icon-option" data-icon="fa-piggy-bank"><i class="fas fa-piggy-bank"></i></button>
                </div><input type="hidden" id="selectedIcon" value="fa-car"></div>
                <div class="form-actions"><button type="button" class="btn-secondary" id="btnCancel">إلغاء</button><button type="submit" class="btn-primary">حفظ الهدف</button></div>
            </form>
        </div>
    </div>

    <div class="modal" id="addAmountModal">
        <div class="modal-content"><div class="modal-header"><h2>إضافة مبلغ</h2><button class="btn-close" id="btnCloseAddAmount"><i class="fas fa-times"></i></button></div>
        <form id="addAmountForm"><input type="hidden" id="addAmountGoalId"><div class="form-group"><label>المبلغ</label><input type="number" id="amountToAdd" placeholder="أدخل المبلغ" required></div>
        <div class="form-actions"><button type="button" class="btn-secondary" id="btnCancelAddAmount">إلغاء</button><button type="submit" class="btn-primary">إضافة</button></div></form></div>
    </div>

    <div class="modal" id="deleteModal">
        <div class="modal-content"><div class="modal-header"><h2>تأكيد الحذف</h2><button class="btn-close" id="btnCloseDelete"><i class="fas fa-times"></i></button></div>
        <div style="text-align:center;padding:1rem"><i class="fas fa-exclamation-triangle" style="font-size:3rem;color:#f43f5e"></i><p>هل أنت متأكد من حذف هذا الهدف؟</p>
        <div class="form-actions"><button class="btn-secondary" id="btnCancelDelete">إلغاء</button><button class="btn-primary" id="btnConfirmDelete" style="background:#f43f5e">حذف</button></div></div></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        let goals = [];
        let goalToDelete = null;
        const charts = {};

        const elements = {
            goalsGrid: document.getElementById('goalsGrid'),
            emptyState: document.getElementById('emptyState'),
            toastContainer: document.getElementById('toastContainer'),
            totalGoals: document.getElementById('totalGoals'),
            totalSaved: document.getElementById('totalSaved'),
            totalTarget: document.getElementById('totalTarget'),
            btnAddGoal: document.getElementById('btnAddGoal'),
            goalModal: document.getElementById('goalModal'),
            addAmountModal: document.getElementById('addAmountModal'),
            deleteModal: document.getElementById('deleteModal'),
            btnCloseModal: document.getElementById('btnCloseModal'),
            btnCloseAddAmount: document.getElementById('btnCloseAddAmount'),
            btnCloseDelete: document.getElementById('btnCloseDelete'),
            goalForm: document.getElementById('goalForm'),
            addAmountForm: document.getElementById('addAmountForm'),
            goalId: document.getElementById('goalId'),
            goalName: document.getElementById('goalName'),
            targetAmount: document.getElementById('targetAmount'),
            currentAmount: document.getElementById('currentAmount'),
            selectedColor: document.getElementById('selectedColor'),
            selectedIcon: document.getElementById('selectedIcon'),
            modalTitle: document.getElementById('modalTitle'),
            colorPicker: document.getElementById('colorPicker'),
            iconPicker: document.getElementById('iconPicker'),
            addAmountGoalId: document.getElementById('addAmountGoalId'),
            amountToAdd: document.getElementById('amountToAdd'),
            btnCancel: document.getElementById('btnCancel'),
            btnCancelAddAmount: document.getElementById('btnCancelAddAmount'),
            btnCancelDelete: document.getElementById('btnCancelDelete'),
            btnConfirmDelete: document.getElementById('btnConfirmDelete'),
        };

        function saveGoals() { localStorage.setItem('financeGoals', JSON.stringify(goals)); }
        function loadGoals() { const saved = localStorage.getItem('financeGoals'); if(saved) { goals = JSON.parse(saved); goals.forEach(g => { if(!g.history) g.history = []; }); } }
        function formatCurrency(amount) { return new Intl.NumberFormat('ar-MA', { style: 'currency', currency: 'MAD', minimumFractionDigits: 0 }).format(amount); }
        function formatDate(dateString) { return new Date(dateString).toLocaleDateString('ar-SA'); }
        function generateId() { return Date.now().toString(36) + Math.random().toString(36).substring(2); }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function calculatePercentage(current, target) { if(target === 0) return 0; return Math.min((current / target) * 100, 100); }
        function lightenColor(color, percent) { return color; }
        function showToast(msg, type) { const toast = document.createElement('div'); toast.className = `toast ${type}`; toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i><span>${msg}</span>`; elements.toastContainer.appendChild(toast); setTimeout(() => toast.remove(), 3000); }

        function animateNumber(element, target, isCurrency = false) { element.textContent = isCurrency ? formatCurrency(target) : target; }

        function updateSummary() {
            elements.totalGoals.textContent = goals.length;
            elements.totalSaved.textContent = formatCurrency(goals.reduce((s,g) => s + g.currentAmount, 0));
            elements.totalTarget.textContent = formatCurrency(goals.reduce((s,g) => s + g.targetAmount, 0));
        }

        function renderGoals() {
            elements.goalsGrid.innerHTML = '';
            if(goals.length === 0) { elements.emptyState.classList.add('active'); return; }
            elements.emptyState.classList.remove('active');
            goals.forEach(goal => {
                const p = calculatePercentage(goal.currentAmount, goal.targetAmount);
                const completed = p >= 100;
                const card = document.createElement('div');
                card.className = `goal-card ${completed ? 'completed' : ''}`;
                card.dataset.id = goal.id;
                card.innerHTML = `
                    <div class="goal-header"><div class="goal-info"><div class="goal-icon"><i class="fas ${goal.icon}"></i></div><div class="goal-title-section"><h3>${escapeHtml(goal.name)}</h3><span class="goal-status ${completed ? 'completed' : ''}">${completed ? '✓ تم الإنجاز' : 'قيد التقدم'}</span></div></div>
                    <div class="goal-actions"><button class="btn-icon" onclick="showHistory('${goal.id}')"><i class="fas fa-history"></i></button><button class="btn-icon" onclick="editGoal('${goal.id}')"><i class="fas fa-edit"></i></button><button class="btn-icon" onclick="confirmDelete('${goal.id}')"><i class="fas fa-trash"></i></button></div></div>
                    <div class="goal-amounts"><div class="amount-box"><div class="amount-value">${formatCurrency(goal.currentAmount)}</div><div>مدخر</div></div><div class="amount-box"><div class="amount-value">${formatCurrency(goal.targetAmount)}</div><div>مستهدف</div></div></div>
                    <div class="progress-bar-container"><div class="progress-bar" style="width:${Math.min(p,100)}%;background:${goal.color}"></div></div>
                    <div class="goal-buttons"><button class="btn-add-money" onclick="showAddAmountModal('${goal.id}')"><i class="fas fa-plus"></i> إضافة</button><button class="btn-quick-add" onclick="quickAdd('${goal.id}',100)">+100</button><button class="btn-quick-add" onclick="quickAdd('${goal.id}',500)">+500</button><button class="btn-quick-add" onclick="quickAdd('${goal.id}',1000)">+1K</button></div>
                `;
                elements.goalsGrid.appendChild(card);
            });
        }

        function addGoal(data) {
            goals.push({ id: generateId(), name: data.name, targetAmount: parseFloat(data.targetAmount), currentAmount: parseFloat(data.currentAmount)||0, color: data.color, icon: data.icon, history: [] });
            saveGoals(); renderGoals(); updateSummary(); showToast('تم إضافة الهدف', 'success');
        }
        function updateGoal(id, data) { const index = goals.findIndex(g=>g.id===id); if(index!==-1) { goals[index] = {...goals[index], name: data.name, targetAmount: parseFloat(data.targetAmount), currentAmount: parseFloat(data.currentAmount)||0, color: data.color, icon: data.icon}; saveGoals(); renderGoals(); updateSummary(); showToast('تم التحديث', 'success'); } }
        function deleteGoal(id) { goals = goals.filter(g=>g.id!==id); saveGoals(); renderGoals(); updateSummary(); showToast('تم الحذف', 'success'); }
        function addAmountToGoal(id, amount) { const g = goals.find(g=>g.id===id); if(g) { g.currentAmount += amount; if(!g.history) g.history=[]; g.history.push({id:generateId(), amount:amount, date:new Date().toISOString()}); saveGoals(); renderGoals(); updateSummary(); showToast(`تم إضافة ${formatCurrency(amount)}`, 'success'); } }
        function quickAdd(id, amount) { addAmountToGoal(id, amount); }

        function openAddModal() { elements.goalId.value=''; elements.goalName.value=''; elements.targetAmount.value=''; elements.currentAmount.value=''; elements.modalTitle.textContent='إضافة هدف جديد'; elements.goalModal.classList.add('active'); }
        function editGoal(id) { const g = goals.find(g=>g.id===id); if(g) { elements.goalId.value=g.id; elements.goalName.value=g.name; elements.targetAmount.value=g.targetAmount; elements.currentAmount.value=g.currentAmount; elements.selectedColor.value=g.color; elements.selectedIcon.value=g.icon; elements.modalTitle.textContent='تعديل الهدف'; elements.goalModal.classList.add('active'); } }
        function showAddAmountModal(id) { elements.addAmountGoalId.value=id; elements.amountToAdd.value=''; elements.addAmountModal.classList.add('active'); }
        function showHistory(id) { const g = goals.find(g=>g.id===id); if(g) { alert(`سجل مدخرات ${g.name}:\n${g.history?.map(h=>`+${formatCurrency(h.amount)} - ${formatDate(h.date)}`).join('\n') || 'لا يوجد سجل'}`); } }
        function confirmDelete(id) { goalToDelete=id; elements.deleteModal.classList.add('active'); }
        function closeAllModals() { elements.goalModal.classList.remove('active'); elements.addAmountModal.classList.remove('active'); elements.deleteModal.classList.remove('active'); goalToDelete=null; }

        function selectColor(color) { elements.selectedColor.value=color; document.querySelectorAll('.color-option').forEach(btn=>btn.classList.toggle('active', btn.dataset.color===color)); }
        function selectIcon(icon) { elements.selectedIcon.value=icon; document.querySelectorAll('.icon-option').forEach(btn=>btn.classList.toggle('active', btn.dataset.icon===icon)); }
        function resetForm() { selectColor('#6366f1'); selectIcon('fa-car'); }

        elements.btnAddGoal.addEventListener('click', openAddModal);
        elements.btnCloseModal.addEventListener('click', closeAllModals);
        elements.btnCloseAddAmount.addEventListener('click', closeAllModals);
        elements.btnCloseDelete.addEventListener('click', closeAllModals);
        elements.btnCancel.addEventListener('click', closeAllModals);
        elements.btnCancelAddAmount.addEventListener('click', closeAllModals);
        elements.btnCancelDelete.addEventListener('click', closeAllModals);
        elements.goalForm.addEventListener('submit', (e) => { e.preventDefault(); const data = { name: elements.goalName.value.trim(), targetAmount: elements.targetAmount.value, currentAmount: elements.currentAmount.value, color: elements.selectedColor.value, icon: elements.selectedIcon.value }; if(elements.goalId.value) updateGoal(elements.goalId.value, data); else addGoal(data); closeAllModals(); });
        elements.addAmountForm.addEventListener('submit', (e) => { e.preventDefault(); const id = elements.addAmountGoalId.value; const amount = parseFloat(elements.amountToAdd.value); if(id && amount>0) addAmountToGoal(id, amount); closeAllModals(); });
        elements.btnConfirmDelete.addEventListener('click', () => { if(goalToDelete) deleteGoal(goalToDelete); closeAllModals(); });
        document.querySelectorAll('.color-option').forEach(btn => btn.addEventListener('click', () => selectColor(btn.dataset.color)));
        document.querySelectorAll('.icon-option').forEach(btn => btn.addEventListener('click', () => selectIcon(btn.dataset.icon)));
        window.addEventListener('click', (e) => { if(e.target.classList.contains('modal')) closeAllModals(); });

        loadGoals(); renderGoals(); updateSummary();

        window.editGoal = editGoal; window.showHistory = showHistory; window.confirmDelete = confirmDelete;
        window.showAddAmountModal = showAddAmountModal; window.quickAdd = quickAdd;
    </script>
</body>
</html>
